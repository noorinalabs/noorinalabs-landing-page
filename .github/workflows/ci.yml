name: CI

on:
  push:
    branches: [main, 'deployments/**']
  pull_request:
    branches: [main, 'deployments/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx,astro,css,md,json}"

      - name: Type check
        run: npx astro check

      - name: Build
        run: npm run build
