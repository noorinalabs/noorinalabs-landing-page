name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: noorinalabs/noorinalabs-landing-page

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # buildx + provenance=true wraps the manifest in an OCI image index
      # (mediaType: application/vnd.oci.image.index.v1+json) even for a
      # single platform. This makes landing-page's manifest shape uniform
      # with api / frontend / user-service so the multi-arch parity check
      # in noorinalabs-deploy/.github/workflows/promote.yml no longer needs
      # a single-arch special case (deploy#242 / closes the option-A path
      # left open by deploy#240).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag scheme (isnad-graph#815 Contract v6 = option C, canonical at
          # https://github.com/noorinalabs/noorinalabs-isnad-graph/issues/815#issuecomment-4301538921):
          #   sha-<short>   — immutable per-push; written here on every event
          #   latest        — mutable pointer; written here on push to main
          #   stg-<short>   — immutable per-push, stg namespace; written here
          #                   ONLY on push to main. Tag history = stg deploy log.
          #   stg-latest    — moving pointer to most-recent stg-<short>; written
          #                   here ONLY on push to main.
          #   prod-<short>  — immutable per-promotion, prod namespace; written
          #                   by deploy#84 ONLY, NOT this file.
          #   prod-latest   — moving pointer; written by deploy#84 ONLY.
          # Tag-count invariants enforced by noorinalabs-deploy
          # .github/workflows/image-tag-invariants.yml (four tags per push).
          # NOTE: this job only runs via `workflow_run` from CI (constrained
          # to `branches: [main]`) or `workflow_dispatch` from main. Both
          # imply main, so the stg-* tags do not need an extra enable guard.
          tags: |
            # Short SHA (e.g., sha-a1b2c3d) — IMMUTABLE anchor
            type=sha,prefix=sha-,format=short
            # Latest — mutable pointer
            type=raw,value=latest
            # stg-<short> per-push in stg namespace — IMMUTABLE
            type=sha,prefix=stg-,format=short
            # stg-latest moving pointer
            type=raw,value=stg-latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Single-platform build, but buildx + provenance=true emits an
          # OCI image index manifest. Verified shape:
          #   docker buildx imagetools inspect --raw <ref> | jq -r .mediaType
          #   → application/vnd.oci.image.index.v1+json
          platforms: linux/amd64
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            npm_token=${{ secrets.GH_PACKAGES_TOKEN }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: GH_PACKAGES_TOKEN
          script: |
            set -euo pipefail
            cd /opt/noorinalabs-deploy
            git fetch origin main && git reset --hard origin/main

            echo "$GH_PACKAGES_TOKEN" | docker login ghcr.io -u noorinalabs --password-stdin
            docker compose -p noorinalabs -f compose/docker-compose.prod.yml --env-file .env pull landing
            docker compose -p noorinalabs -f compose/docker-compose.prod.yml --env-file .env up -d landing
            docker compose -p noorinalabs -f compose/docker-compose.prod.yml --env-file .env restart caddy

            echo "==> Waiting for landing service to stabilize..."
            for i in $(seq 1 12); do
              health=$(docker inspect --format='{{.State.Health.Status}}' noorinalabs-landing-1 2>/dev/null || echo "not_found")
              echo "Attempt $i/12: landing=$health"
              if [ "$health" = "healthy" ]; then echo "Landing page healthy"; break; fi
              if [ "$i" -eq 12 ]; then
                echo "ERROR: Landing health check failed after 60 seconds"
                docker compose -p noorinalabs -f compose/docker-compose.prod.yml logs --tail=50 landing
                exit 1
              fi
              sleep 5
            done

      - name: Report deployment status
        if: always()
        run: |
          echo "## Deploy noorinalabs-landing-page: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
