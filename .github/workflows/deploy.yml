name: Publish to GHCR

# Publishes landing-page container images to GHCR on push to main.
#
# Production rollout flows through the deploy repo:
#   noorinalabs-deploy/.github/workflows/promote.yml   (registry retag stg-* → prod-*)
#   noorinalabs-deploy/.github/workflows/deploy-prod.yml (SSH deploy to prod VPS)
#
# This workflow does NOT push-time SSH-deploy (intentional architectural
# divergence from isnad-graph/user-service per ontology
# `repos/landing-page.yaml § ci.deploy_workflow.description`). The previous
# `deploy` job here was a leftover from the original (a32a249) one-VPS
# topology and was removed in #77 after it began timing out against
# vars.VPS_HOST in the W10 stg/prod split (deploy#86 / main#212).

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: noorinalabs/noorinalabs-landing-page

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # buildx + provenance=true wraps the manifest in an OCI image index
      # (mediaType: application/vnd.oci.image.index.v1+json) even for a
      # single platform. This makes landing-page's manifest shape uniform
      # with api / frontend / user-service so the multi-arch parity check
      # in noorinalabs-deploy/.github/workflows/promote.yml no longer needs
      # a single-arch special case (deploy#242 / closes the option-A path
      # left open by deploy#240).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag scheme (isnad-graph#815 Contract v6 = option C, canonical at
          # https://github.com/noorinalabs/noorinalabs-isnad-graph/issues/815#issuecomment-4301538921):
          #   sha-<short>   — immutable per-push; written here on every event
          #   latest        — mutable pointer; written here on push to main
          #   stg-<short>   — immutable per-push, stg namespace; written here
          #                   ONLY on push to main. Tag history = stg deploy log.
          #   stg-latest    — moving pointer to most-recent stg-<short>; written
          #                   here ONLY on push to main.
          #   prod-<short>  — immutable per-promotion, prod namespace; written
          #                   by deploy#84 ONLY, NOT this file.
          #   prod-latest   — moving pointer; written by deploy#84 ONLY.
          # Tag-count invariants enforced by noorinalabs-deploy
          # .github/workflows/image-tag-invariants.yml (four tags per push).
          # NOTE: this job only runs via `workflow_run` from CI (constrained
          # to `branches: [main]`) or `workflow_dispatch` from main. Both
          # imply main, so the stg-* tags do not need an extra enable guard.
          tags: |
            # Short SHA (e.g., sha-a1b2c3d) — IMMUTABLE anchor
            type=sha,prefix=sha-,format=short
            # Latest — mutable pointer
            type=raw,value=latest
            # stg-<short> per-push in stg namespace — IMMUTABLE
            type=sha,prefix=stg-,format=short
            # stg-latest moving pointer
            type=raw,value=stg-latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Single-platform build, but buildx + provenance=true emits an
          # OCI image index manifest. Verified shape:
          #   docker buildx imagetools inspect --raw <ref> | jq -r .mediaType
          #   → application/vnd.oci.image.index.v1+json
          platforms: linux/amd64
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            npm_token=${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Report publish status
        if: always()
        run: |
          {
            echo "## Publish to GHCR: ${{ job.status }}"
            echo ""
            echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            echo "- **Triggered by:** ${{ github.actor }}"
            echo ""
            echo "Production rollout: triggered separately via \`noorinalabs-deploy/.github/workflows/promote.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"
