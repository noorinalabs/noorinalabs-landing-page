name: CI — Docs & Config

# Phase-3 end-state criterion #5 (noorinalabs-main#326): all committed
# artifacts pass checks — including documentation and config, not just the
# Astro/TS source ci.yml gates. This workflow closes the NON-source gap on
# landing-page: markdown/docs (lint + spellcheck + internal link-check) and
# committed config (YAML/JSON syntax + workflow actionlint) across docs, the
# .claude tree, and root. Mirrors the parent-canonical pattern (#563) adapted
# to this repo's single-tree layout (no child-repo ignores).

on:
  push:
    branches: [main, "deployments/**"]
    paths:
      - "**/*.md"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"
      - "**/*.jsonc"
      - ".claude/**"
      - "docs/**"
      - ".markdownlint-cli2.jsonc"
      - ".cspell.json"
      - ".cspell/**"
      - ".lychee.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, "deployments/**"]
    paths:
      - "**/*.md"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"
      - "**/*.jsonc"
      - ".claude/**"
      - "docs/**"
      - ".markdownlint-cli2.jsonc"
      - ".cspell.json"
      - ".cspell/**"
      - ".lychee.toml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: markdownlint-cli2
        # Config (.markdownlint-cli2.jsonc) carries the glob + ignores and
        # disables the stylistic rules the ADR/charter corpus intentionally
        # violates, keeping the structural rules that catch real breakage.
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0

  spellcheck:
    name: Spellcheck (cspell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: cspell
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0
        with:
          # Dictionary + ignore rules come from .cspell.json. The `files` glob
          # here is authoritative for the action; it is scoped to the AUTHORED
          # prose set — CLAUDE.md, RUNBOOK.md, docs, skills, charter. The
          # append-only records (feedback_log) and roster cards are excluded:
          # they are dense with person names that are not spell-defects. A real
          # typo in authored prose blocks; new domain terms go in
          # .cspell/project-words.txt.
          config: ".cspell.json"
          files: |
            CLAUDE.md
            RUNBOOK.md
            docs/**/*.md
            .claude/skills/**/*.md
            .claude/team/charter.md
            src/content/STYLE_GUIDE.md
          incremental_files_only: false
          strict: true

  linkcheck:
    name: Internal link-check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # .lychee.toml runs offline (internal/relative links only; external
          # URL liveness is intentionally not gated — third-party uptime must
          # not flake the docs gate). A broken relative cross-reference fails.
          args: "--config .lychee.toml --no-progress './**/*.md'"
          fail: true

  config-lint:
    name: Config — YAML/JSON syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate committed YAML + JSON parse
        # A committed config file that does not parse is a real defect — this is
        # the syntax floor for the non-source config artifacts ci.yml ignores.
        # Generated/vendored trees are excluded.
        run: |
          python3 - <<'PY'
          import json
          import sys
          import pathlib

          try:
              import yaml  # PyYAML is preinstalled on ubuntu-latest runners
          except ImportError:
              import subprocess

              subprocess.check_call([sys.executable, "-m", "pip", "install", "pyyaml"])
              import yaml

          skip_prefixes = (
              "node_modules/",
              "dist/",
              ".astro/",
              ".claude/worktrees/",
              ".git/",
          )
          root = pathlib.Path(".")
          failures = []
          for path in root.rglob("*"):
              rel = path.as_posix()
              if path.is_dir() or rel.startswith(skip_prefixes):
                  continue
              if path.suffix in (".yaml", ".yml"):
                  try:
                      list(yaml.safe_load_all(path.read_text(encoding="utf-8")))
                  except Exception as exc:  # noqa: BLE001
                      failures.append(f"{rel}: YAML parse error: {exc}")
              elif path.suffix == ".json":
                  # .jsonc (JSON-with-comments) is excluded — standard json
                  # cannot parse comments; markdownlint validates it instead.
                  try:
                      json.loads(path.read_text(encoding="utf-8"))
                  except Exception as exc:  # noqa: BLE001
                      failures.append(f"{rel}: JSON parse error: {exc}")
          if failures:
              print("\n".join(failures))
              sys.exit(1)
          print("All committed YAML/JSON parse cleanly.")
          PY

  actionlint:
    name: Config — Workflow actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint on workflows
        # shellcheck is preinstalled on ubuntu-latest, so actionlint's embedded
        # shellcheck integration runs (per the actionlint-needs-shellcheck
        # discipline) rather than silently skipping.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  precommit-ci-sync:
    name: Pre-commit ⇄ CI sync-drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify pre-commit config mirrors CI-enforced checks (#327)
        # Fails if a check CI enforces (eslint/prettier/astro-check/build/
        # actionlint/…) is missing from .pre-commit-config.yaml, so local hooks
        # can't silently drift behind CI. This is the machine-enforcement that
        # keeps the #327 mirror from rotting.
        run: python3 scripts/pre_commit_ci_sync.py .
